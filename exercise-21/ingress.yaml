apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    
    # SSL/TLS Configuration
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:123456789012:certificate/abc-123-xyz
    
    # Automatic HTTP to HTTPS Redirection configuration
    alb.ingress.kubernetes.io/actions.ssl-redirect: |
      {"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}
    
    # Global Health Check Settings
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
    alb.ingress.kubernetes.io/healthy-threshold-count: '2'
    alb.ingress.kubernetes.io/unhealthy-threshold-count: '3'
    alb.ingress.kubernetes.io/success-codes: '200'

    # Target group health checks override per service (using target-group annotations if required, otherwise defaults to traffic port)
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          # Redirect all HTTP requests to HTTPS
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ssl-redirect
                port:
                  name: use-annotation
          # API Service Routing
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-service
                port:
                  number: 8080
          # Admin Service Routing
          - path: /admin/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: admin-service
                port:
                  number: 8081
          # Dashboard Service Routing
          - path: /dashboard/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: dashboard-service
                port:
                  number: 8082
