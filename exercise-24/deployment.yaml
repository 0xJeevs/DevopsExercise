apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: production
  labels:
    app: customer-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      # Crucial: Assumes the role configured for DynamoDB access via OIDC token
      serviceAccountName: payment-service-sa
      containers:
        - name: application
          image: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/customer-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AWS_REGION
              value: "ap-south-1"
            - name: DYNAMODB_TABLE
              value: "customer-data"
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: production
spec:
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app: customer-service
