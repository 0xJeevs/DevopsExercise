# Dev values for payment-service
replicaCount: 1

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

configMapData:
  DB_HOST: "dev-db.internal"
  DB_PORT: "5432"
  ENV_NAME: "dev"

secretData:
  DB_USER: "dev_user"
  DB_PASSWORD: "dev-secure-password"

ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: dev-payment.example.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
