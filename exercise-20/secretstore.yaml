apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        # Relies on IRSA mapped to the payment-service-sa
        jwt:
          serviceAccountRef:
            name: payment-service-sa
