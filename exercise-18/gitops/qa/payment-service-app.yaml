apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-qa
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/my-org/gitops-apps.git'
    targetRevision: qa  # Tracks the qa branch
    path: environments/qa/payment-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: qa
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
