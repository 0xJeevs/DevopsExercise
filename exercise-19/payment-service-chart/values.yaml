# Default values for payment-service.
# This is a YAML-formatted file.

replicaCount: 1

image:
  repository: 123456789012.dkr.ecr.ap-south-1.amazonaws.com/payment-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

configMapData:
  DB_HOST: "localhost"
  DB_PORT: "5432"

secretData:
  DB_USER: "postgres"
  DB_PASSWORD: "default-password"

ingress:
  enabled: false
  className: "alb"
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
