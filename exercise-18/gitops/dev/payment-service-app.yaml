apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io  # Enables cascading deletion (pruning)
spec:
  project: default
  source:
    repoURL: 'https://github.com/my-org/gitops-apps.git'
    targetRevision: dev  # Tracks the dev branch
    path: environments/dev/payment-service
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev
  syncPolicy:
    automated:
      prune: true      # Prunes resources deleted in Git
      selfHeal: true   # Overrides manual changes in live cluster
    syncOptions:
      - CreateNamespace=true
