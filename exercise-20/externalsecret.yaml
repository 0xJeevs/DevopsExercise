apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payment-secret-sync
  namespace: production
spec:
  refreshInterval: 10m  # Sync interval
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: payment-app-secret  # The Kubernetes Secret to create
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: production/payment-service-secrets
        property: db_username
    - secretKey: DB_PASSWORD
      remoteRef:
        key: production/payment-service-secrets
        property: db_password
    - secretKey: JWT_SECRET
      remoteRef:
        key: production/payment-service-secrets
        property: jwt_secret
